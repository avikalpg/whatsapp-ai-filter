name: Database Migration

on:
  push:
    branches:
      - main
    paths:
      - 'landing-page/db/setup.sql'
      - '.github/workflows/migrate.yml'

jobs:
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run migration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          node - << 'EOF'
          const { Pool } = require('pg');
          const fs = require('fs');
          const path = require('path');

          async function main() {
            if (!process.env.DATABASE_URL) {
              console.error('DATABASE_URL secret is not set in this environment.');
              process.exit(1);
            }

            const pool = new Pool({
              connectionString: process.env.DATABASE_URL,
              ssl: { rejectUnauthorized: false },
            });

            try {
              const sql = fs.readFileSync(
                path.join(process.cwd(), 'landing-page', 'db', 'setup.sql'),
                'utf8'
              );
              console.log('Running migration...');
              await pool.query(sql);
              console.log('Migration complete.');
            } finally {
              await pool.end();
            }
          }

          main().catch((err) => {
            console.error('Migration failed:', err.message);
            process.exit(1);
          });
          EOF

      - name: Confirm tables exist
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          node - << 'EOF'
          const { Pool } = require('pg');
          async function main() {
            const pool = new Pool({
              connectionString: process.env.DATABASE_URL,
              ssl: { rejectUnauthorized: false },
            });
            try {
              const { rows } = await pool.query(`
                SELECT table_name FROM information_schema.tables
                WHERE table_schema = 'public'
                  AND table_name IN ('mobile_users', 'usage_logs', 'analytics')
                ORDER BY table_name
              `);
              const found = rows.map(r => r.table_name);
              const required = ['analytics', 'mobile_users', 'usage_logs'];
              const missing = required.filter(t => !found.includes(t));
              if (missing.length) {
                console.error('Missing tables after migration:', missing.join(', '));
                process.exit(1);
              }
              console.log('All required tables present:', found.join(', '));
            } finally {
              await pool.end();
            }
          }
          main().catch(err => { console.error(err.message); process.exit(1); });
          EOF
